<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reading Stats</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
  <script src="stats.js" defer></script>
</head>
<body>
  <div class="wrapper">
    <a href="index.html" class="site-title" aria-label="Back to shelf">← back to shelf</a>

    <section id="showcase" class="stats-hero">
      <div class="book-back">
        <h2>Reading stats</h2>
        <h3>Pick a view from the menu</h3>
      </div>
    </section>

    <div class="stats-controls">
      <label for="chartSelect" class="label">Pick a chart</label>
      <select id="chartSelect" class="stats-select">
        <option value="gap">Time between release and read</option>
        <option value="country">Where authors are from</option>
        <option value="rating">Star spread</option>
        <option value="authors">Top 10 authors</option>
      </select>
    </div>

    <section id="chartArea" class="chart-area">
      <canvas id="chartCanvas" aria-label="Reading chart"></canvas>
      <span class="compass-label compass-n">N</span>
      <span class="compass-label compass-s">S</span>
      <span class="compass-label compass-e">E</span>
      <span class="compass-label compass-w">W</span>
    </section>
  </div>
</body>
</html>
