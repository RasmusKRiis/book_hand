<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Pixel Reading Shelf</title>
  <link rel="stylesheet" href="styles.css?v=20260402g"/>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js" defer></script>
  <script src="script.js?v=20260402e" defer></script>
</head>
<body>
  <div class="wrapper">
    <div class="top-bar">
      <a href="https://www.instagram.com/reading_mimmi/profilecard/?igsh=MWhnaXd2Y21sN3ZucQ==" class="site-title" target="_blank" rel="noopener">mimmi’s shelf</a>

      <div class="control-panel">
        <label class="search-field" for="searchInput">
          <span class="search-label">Find a book</span>
          <input id="searchInput" class="search-input" type="search" placeholder="Title or author" autocomplete="off"/>
        </label>

        <div class="filter-box">
          <label class="toggle" title="切換 cat3‑waan6 (toggle)">
            <input type="checkbox" id="filterToggle"/>
            <span class="slider"></span>
          </label>
          <span id="filterLabel" class="filter-label">Currently Reading</span>
        </div>
      </div>
    </div>

    <section id="showcase">
      <button id="bookLink" class="book-display" type="button" aria-label="Open current book page">
        <img id="cover" class="cover" src="book.png" alt="Book cover" loading="eager" decoding="async" fetchpriority="high"/>
        <img class="hand" src="assets/hand.png" alt="Pixel hand"/>
      </button>

      <div id="back" class="book-back">
        <h2 id="title"></h2>
        <h3 id="author"></h3>
        <ul>
          <li><strong>Released:</strong> <span id="released"></span></li>
          <li><strong>Read:</strong> <span id="read"></span></li>
          <li class="rating-line">
            <span id="stars" class="stars" aria-label="Star rating"></span>
          </li>
        </ul>

        <div class="comment-block">
          <p class="label">Notes</p>
          <p id="aiComment" class="note-text"></p>
        </div>
      </div>
    </section>

    <div class="divider"></div>

    <section id="grid" class="grid" aria-live="polite"></section>
  </div>
</body>
</html>
